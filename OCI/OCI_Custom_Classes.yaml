## Custom made OCI classes

classes:
  
  - class: OCI-workload
    parent: services
    builtin: false
    aka: workloads
    description: >
      An OCI compute instance or workload that participates in ZPR policy.
    attributes:
      tier:
        type: multi
        values: [app, web, db]
      stage:
        type: multi
        values: [development, production]

  - class: network
    parent: endpoints
    builtin: false
    aka: network
    description: >
      An OCI network that participates in ZPR policy.
    attributes:
      tier:
        type: multi
        values: [app, web, db]
      name:
        type: multi
        values: [ZPR-Test, ZPR-Prod]
      stage:
        type: multi
        values: [development, production]      
