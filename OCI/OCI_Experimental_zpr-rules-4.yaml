# ZPR rules export

rules:
  -     id: 669afd22f24842f897e87b46d28ab062
    name: "Allow web to access app"
    result: allow
    priority: 100
    verb: access
    subject:
      class: OCI-workload
      attrs:
        tier: web
    object:
      class: OCI-workload
      attrs:
        tier: app
  -     id: 27ae77267e1347a7be9f1436a975e044
    name: "Web blocked from db"
    result: never
    priority: 100
    verb: access
    subject:
      class: OCI-workload
      attrs:
        tier: web
    object:
      class: OCI-workload
      attrs:
        tier: db
  -     id: 8a3888ddc8554e3795a7dd66350d3bcc
    name: "Allow app to talk to db"
    result: allow
    priority: 100
    verb: access
    subject:
      class: OCI-workload
      attrs:
        tier: app
    object:
      class: OCI-workload
      attrs:
        tier: db
  -     id: bbd982ef91844125938c83dbf236006b
    name: "Block development from production apps"
    result: never
    priority: 100
    subject:
      class: OCI-workload
      attrs:
        stage: development
    object:
      class: OCI-workload
      attrs:
        stage: production
  -     id: 304e91f104f24eea92ab780522da0b39
    name: "Allow workloads on ZPR-Test to access others on ZPR-Test"
    result: allow
    priority: 100
    subject:
      class: OCI-workload
    accessor_endpoint:
      class: network
      attrs:
        name: ZPR-Test
    object:
      class: OCI-workload
    server_endpoint:
      class: network
      attrs:
        name: ZPR-Test
  -     id: 29d3f0a5f126469aba3811e845a3e934
    name: "Block ZPR-Test apps from ZPR-Prod network"
    result: never
    priority: 100
    subject:
      class: OCI-workload
    accessor_endpoint:
      class: network
      attrs:
        name: ZPR-Test
    object:
      class: OCI-workload
    server_endpoint:
      class: network
      attrs:
        name: ZPR-Prod
  -     id: 231117d9c58b4fe2a2570db67a40dece
    name: "Block anything on ZPR-Test network from ZPR-Prod network"
    result: never
    priority: 100
    accessor_endpoint:
      class: network
      attrs:
        name: ZPR-Test
    server_endpoint:
      class: network
      attrs:
        name: ZPR-Prod
  -     id: 13e67754d4d6429c8f1cf01aae22533c
    name: "App tier connects to database on zpr-test"
    description: "Allow app-tier workloads to connect to database-tier workloads within the zpr-test network."
    result: allow
    priority: 100
    verb: connect-to
    subject:
      class: security_attribute
      attrs:
        newcorp.tier: app
        newcorp.network: zpr-test
    object:
      class: security_attribute
      attrs:
        newcorp.tier: database
        newcorp.network: zpr-test
  -     id: 1be33b06ca4147afae53fb7919542e38
    name: "App tier connects to database on zpr-test"
    description: "Allow app-tier workloads to connect to database-tier workloads within the zpr-test network."
