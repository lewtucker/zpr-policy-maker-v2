        - article "Zero Trust Packet Routing Policy" [ref=e77]:
          - article "Zero Trust Packet Routing Policy" [ref=e78]:
            - heading "Zero Trust Packet Routing Policy" [level=1] [ref=e79]
            - generic [ref=e80]:
              - paragraph [ref=e81]: A Zero Trust Packet Routing policy enforces access control based on the security attributes applied to resources involved in an access attempt.
              - generic [ref=e82]:
                - paragraph [ref=e83]:
                  - text: A policy is a container for a set of policy statements. A policy statement is a rule that specifies who can access what resource, and how. Zero Trust Packet Routing (ZPR) policy is based on an Attribute Based Access Control (ABAC) authorization model that evaluates attributes (or characteristics) to determine access to resources. This approach is different than OCI IAM (see
                  - link "How ZPR Differs from IAM" [ref=e84] [cursor=pointer]:
                    - /url: overview.htm#zpr-iam-comparison
                  - text: ). ZPR policies are designed to achieve "attribute based access control" where the security attributes of source, target, and network are factored into the evaluation of policy using Zero Trust Packet Routing Policy Language (ZPL).
                - paragraph [ref=e85]: ZPL lets you write policy statements focused on allowing client endpoints with security attributes to access other endpoints.
                - generic [ref=e86]:
                  - img [ref=e88]
                  - strong [ref=e91]: Note
                  - paragraph [ref=e92]:
                    - text: ZPR policies don't take the place of setting up peering relationships between VCNs. For peering two VCNs in the same region, see
                    - link "Local VCN Peering using Local Peering Gateways" [ref=e93] [cursor=pointer]:
                      - /url: /iaas/Content/Network/Tasks/localVCNpeering.htm
                    - text: or
                    - link "Local VCN Peering Through an Upgraded DRG" [ref=e94] [cursor=pointer]:
                      - /url: /iaas/Content/Network/Tasks/scenario_d.htm
                    - text: . For peering two VCNs in different regions, see
                    - link "Remote VCN Peering through an Upgraded DRG" [ref=e95] [cursor=pointer]:
                      - /url: /iaas/Content/Network/Tasks/scenario_e.htm
                    - text: .
                - paragraph [ref=e96]: "ZPL supports the following types of allow statements in regards to communication to, from, and within individual VCNs identified by their security attributes:"
                - list [ref=e97]:
                  - listitem [ref=e98]: Allow traffic between two endpoints within a VCN
                  - listitem [ref=e99]: Allow traffic between endpoints in different VCNs within the same region
                - paragraph [ref=e100]:
                  - text: For example, the following policy statement allows
                  - code [ref=e101]: apps:hr-apps
                  - text: hosts to read any OCI resource with the
                  - code [ref=e102]: apps:hr-app-data
                  - text: "security attribute applied to them within the same VCN:"
                - code [ref=e104]: in networks:application VCN allow apps:hr-apps endpoints to connect to apps:hr-app-data endpoints
                - paragraph [ref=e105]:
                  - text: The following policy statement allows
                  - code [ref=e106]: networks:net1:App1
                  - text: endpoints in the
                  - code [ref=e107]: networks:net1
                  - text: VCN to connect to
                  - code [ref=e108]: DB-Server:App1
                  - text: endpoints in the
                  - code [ref=e109]: networks:net2
                  - text: "VCN, when both VCNs are in the same region:"
                - code [ref=e111]: allow networks:net1:App1 endpoints in networks:net1 VCN to connect to DB-Server:App1 endpoints in networks:net2 VCN
                - paragraph [ref=e112]:
                  - text: To allow traffic between endpoints in different VCNs that aren't in the same region, or VCNs in the same region that don't have security attributes assigned to them, you must use CIDR or IP-based policy. For example, if you need to allow a client in
                  - code [ref=e113]: networks:net1
                  - text: "VCN to access a Compute instance or database in another VCN in a different region, you need to use IP addresses to reference the targets in the other VCN:"
                - code [ref=e115]: in networks:net1 VCN allow apps:app1 endpoints to connect to '192.168.0.0/16'
                - paragraph [ref=e116]:
                  - text: To create ZPR policies, you must first
                  - link "create security attributes" [ref=e117] [cursor=pointer]:
                    - /url: create-security-attribute.htm
                  - text: . Security attributes are factored into the evaluation of ZPR policy. After you create security attributes, review
                  - link "ZPR policy syntax" [ref=e118] [cursor=pointer]:
                    - /url: zpr-policy-syntax.htm
                  - text: ", then examine the options for creating a policy with"
                  - link "policy builders" [ref=e119] [cursor=pointer]:
                    - /url: create-zpr-policy.htm#console
                  - text: . You can also learn about ZPR policies from
                  - link "examples" [ref=e120] [cursor=pointer]:
                    - /url: zpr-policy-examples.htm
                  - text: .
                - generic [ref=e121]:
                  - img [ref=e123]
                  - strong [ref=e126]: Note
                  - text: You must add security attributes to OCI resources for ZPR policy to take effect.
                - paragraph [ref=e127]:
                  - text: After you create security attributes and ZPR policies, you can
                  - link "add the security attributes to resources" [ref=e128] [cursor=pointer]:
                    - /url: managing-resources.htm
                  - text: .
                - paragraph [ref=e129]:
                  - text: See
                  - link "Resources That Can Be Assigned Security Attributes" [ref=e130] [cursor=pointer]:
                    - /url: overview.htm#resources-assigned-security-attributes
                  - text: for the types of resources you can use in ZPR policies.
