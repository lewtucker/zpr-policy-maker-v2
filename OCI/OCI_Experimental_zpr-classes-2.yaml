# ZPR classes export — user-defined only

classes:
  -     class: OCI-workload
    parent: services
    aka: workloads
    description: "An OCI compute instance or workload that participates in ZPR policy.\n"
    attributes:
      tier:
        type: multi
        values: [app, web, db]
      stage:
        type: multi
        values: [development, production]
  -     class: network
    parent: endpoints
    aka: network
    description: "An OCI network that participates in ZPR policy.\n"
    attributes:
      tier:
        type: multi
        values: [app, web, db]
      name:
        type: multi
        values: [ZPR-Test, ZPR-Prod]
      stage:
        type: multi
        values: [development, production]
  -     class: security_attribute
    parent: endpoints
    aka: security_attributes
    description: "Security tags on OCI resources"
    attributes:
      newcorp.tier:
        type: single
        values: [web, app, database, load-balancer]
      newcorp.network:
        type: single
        values: [zpr-test]
      newcorp.bootstrap:
        type: single
        values: [active, off]