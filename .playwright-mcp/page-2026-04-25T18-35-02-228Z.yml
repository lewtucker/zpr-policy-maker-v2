            - generic [ref=e93]:
              - paragraph [ref=e94]: Create and manage Zero Trust Packet Routing (ZPR) policies.
              - paragraph [ref=e95]: "A ZPR policy is a rule that governs the communication between specific endpoints identified by their security attributes. A ZPR policy can be created only in the root compartment of a tenancy. To create a ZPR policy, you have several options:"
              - list [ref=e96]:
                - listitem [ref=e97]:
                  - strong [ref=e98]: Simple policy builder
                  - text: lets you select from prepopulated lists of resources identified by their security attributes to express security intent between two endpoints. The policy builder automatically generates the policy statement using correct syntax.
                - listitem [ref=e99]:
                  - link "Policy template builder" [ref=e100] [cursor=pointer]:
                    - /url: managing-zpr-policies.htm#zpr-policy-template-builder
                    - strong [ref=e101]: Policy template builder
                  - text: lets you select from a list of templates based on common use case scenarios that provide prefilled ZPR policy statements that you can then customize to create a ZPR policy.
                - listitem [ref=e102]:
                  - strong [ref=e103]: Manual policy builder
                  - text: lets you enter free-form policy.
              - generic [ref=e104]:
