# OCI ZPL Class Definitions — RFC-15.5 YAML
# Importable via Class YAML ▾ → Upload on the ZPL Definitions page.
#
# Attribute names are shortened from OCI ZPR namespaced form:
#   newcorp.tier → tier,  newcorp.network → network, etc.

classes:

  - class: oci-workload
    parent: endpoints
    aka: oci-workloads
    description: >
      An OCI compute instance or workload that participates in ZPR policy.
      Attributes are translated from the OCI ZPR newcorp.* namespace.
      Use tier + network together to scope rules to the zpr-test VCN.
    attributes:
      tier:
        type: single
        values: [web, app, db, lb, proxy, employee, admin, monitoring]
      network:
        type: single
        values: [zpr-test]
      bootstrap:
        type: single
        values: ["true"]
      devtest:
        type: single
        values: ["true"]

  - class: internet-host
    parent: endpoints
    aka: internet-hosts
    description: >
      Represents an external internet host — used as subject for inbound
      traffic (source: internet) or as object for outbound traffic
      (destination 0.0.0.0/0). The 'source' attribute distinguishes the
      two cases when needed.
    attributes:
      source:
        type: single
        values: [internet, any]
