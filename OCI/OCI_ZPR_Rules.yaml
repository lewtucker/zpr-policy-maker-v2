rules:

  # ── Admin / DB Direct Access ────────────────────────────────────────────────

  - id: oci-admin-to-db
    name: Admin to DB
    description: Admin tier to DB tier (MySQL)
    result: allow
    priority: 900
    verb: connect to
    protocol: tcp/3306
    subject:
      newcorp.tier: admin
      newcorp.network: zpr-test
    resource:
      newcorp.tier: db
      newcorp.network: zpr-test

  - id: oci-db-to-admin
    name: DB to Admin
    description: DB tier to Admin tier (MySQL)
    result: allow
    priority: 890
    verb: connect to
    protocol: tcp/3306
    subject:
      newcorp.tier: db
      newcorp.network: zpr-test
    resource:
      newcorp.tier: admin
      newcorp.network: zpr-test

  # ── Employee Outbound ────────────────────────────────────────────────────────

  - id: oci-employee-outbound
    name: Employee Outbound to Internet
    description: Employee tier workloads may connect to any internet address
    result: allow
    priority: 880
    verb: connect to
    subject:
      newcorp.tier: employee
      newcorp.network: zpr-test
    resource:
      source: "0.0.0.0/0"

  # ── Internet / Load Balancer Ingress ─────────────────────────────────────────

  - id: oci-internet-to-web
    name: Internet to Web Tier
    description: Public HTTPS ingress to web tier
    result: allow
    priority: 870
    verb: connect to
    protocol: tcp/443
    subject:
      source: internet
    resource:
      newcorp.tier: web
      newcorp.network: zpr-test

  - id: oci-internet-to-lb
    name: Internet to Load Balancer
    description: Public HTTPS ingress to load balancer
    result: allow
    priority: 860
    verb: connect to
    protocol: tcp/443
    subject:
      source: internet
    resource:
      newcorp.tier: lb
      newcorp.network: zpr-test

  # ── Proxy / Load Balancer → Tier Routing ────────────────────────────────────

  - id: oci-proxy-to-web
    name: Proxy to Web Tier
    description: Proxy tier forwards HTTP traffic to web tier
    result: allow
    priority: 850
    verb: connect to
    protocol: tcp/8080
    subject:
      newcorp.tier: proxy
      newcorp.network: zpr-test
    resource:
      newcorp.tier: web
      newcorp.network: zpr-test

  - id: oci-lb-to-web
    name: Load Balancer to Web Tier
    description: Load balancer forwards HTTP traffic to web tier
    result: allow
    priority: 840
    verb: connect to
    protocol: tcp/8080
    subject:
      newcorp.tier: lb
      newcorp.network: zpr-test
    resource:
      newcorp.tier: web
      newcorp.network: zpr-test

  - id: oci-web-to-app
    name: Web Tier to App Tier
    description: Web tier calls app tier over HTTP
    result: allow
    priority: 830
    verb: connect to
    protocol: tcp/8080
    subject:
      newcorp.tier: web
      newcorp.network: zpr-test
    resource:
      newcorp.tier: app
      newcorp.network: zpr-test

  - id: oci-app-to-db
    name: App Tier to DB Tier
    description: App tier connects to database (MySQL)
    result: allow
    priority: 820
    verb: connect to
    protocol: tcp/3306
    subject:
      newcorp.tier: app
      newcorp.network: zpr-test
    resource:
      newcorp.tier: db
      newcorp.network: zpr-test

  # ── DB Replication ───────────────────────────────────────────────────────────

  - id: oci-db-replication
    name: DB to DB Replication
    description: Database replication between DB tier nodes
    result: allow
    priority: 810
    verb: connect to
    protocol: tcp/3306
    subject:
      newcorp.tier: db
      newcorp.network: zpr-test
    resource:
      newcorp.tier: db
      newcorp.network: zpr-test

  # ── Bootstrap Operations ─────────────────────────────────────────────────────

  - id: oci-bootstrap-outbound
    name: Bootstrap Workload Outbound
    description: Bootstrap workloads fetch packages/config during initialization (HTTPS)
    result: allow
    priority: 800
    verb: connect to
    protocol: tcp/443
    subject:
      newcorp.bootstrap: "true"
      newcorp.network: zpr-test
    resource:
      source: "0.0.0.0/0"

  - id: oci-internet-to-bootstrap
    name: Internet to Bootstrap Workload
    description: SSH access to bootstrap workloads during initialization
    result: allow
    priority: 790
    verb: connect to
    protocol: tcp/22
    subject:
      source: internet
    resource:
      newcorp.bootstrap: "true"
      newcorp.network: zpr-test

  # ── Dev/Test Operations ──────────────────────────────────────────────────────

  - id: oci-devtest-outbound
    name: Dev/Test Workload Outbound
    description: Dev/test workloads may reach internet over HTTPS
    result: allow
    priority: 780
    verb: connect to
    protocol: tcp/443
    subject:
      newcorp.devtest: "true"
      newcorp.network: zpr-test
    resource:
      source: "0.0.0.0/0"

  - id: oci-internet-to-devtest
    name: Internet to Dev/Test Workload
    description: SSH access to dev/test workloads
    result: allow
    priority: 770
    verb: connect to
    protocol: tcp/22
    subject:
      source: internet
    resource:
      newcorp.devtest: "true"
      newcorp.network: zpr-test

  - id: oci-devtest-to-db
    name: Dev/Test to DB Tier
    description: Dev/test workloads may query the database (MySQL)
    result: allow
    priority: 760
    verb: connect to
    protocol: tcp/3306
    subject:
      newcorp.devtest: "true"
      newcorp.network: zpr-test
    resource:
      newcorp.tier: db
      newcorp.network: zpr-test

  # ── App Monitoring ───────────────────────────────────────────────────────────

  - id: oci-app-to-monitoring
    name: App Tier to Monitoring
    description: App tier sends metrics/telemetry to monitoring tier (HTTPS)
    result: allow
    priority: 750
    verb: connect to
    protocol: tcp/443
    subject:
      newcorp.tier: app
      newcorp.network: zpr-test
    resource:
      newcorp.tier: monitoring
      newcorp.network: zpr-test

  # ── Default Deny ─────────────────────────────────────────────────────────────

  - id: oci-default-deny
    name: Default Deny All
    description: Explicit deny-all — any traffic not matched above is blocked.
    result: never
    priority: 1
